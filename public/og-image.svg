<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081B33"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1" />
    <line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1" />
    <line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1" />
    <line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1" />
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1" />
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="1" />
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1" />
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="1" />
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1" />
  </g>
  <!-- Gradient orb -->
  <circle cx="950" cy="315" r="200" fill="#2563EB" opacity="0.08"/>
  <circle cx="250" cy="500" r="150" fill="#7C3AED" opacity="0.06"/>
  <!-- Logo box -->
  <rect x="80" y="180" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="108" y="215" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">IA</text>
  <!-- Company name -->
  <text x="80" y="290" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="white">IA Bestsell Technologies</text>
  <!-- Tagline -->
  <text x="80" y="360" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white">Engineering Better</text>
  <text x="80" y="420" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="url(#accent)">Businesses</text>
  <!-- Subtitle -->
  <text x="80" y="480" font-family="system-ui, sans-serif" font-size="18" fill="#94A3B8">Cloud · Cybersecurity · DevOps · Software · AI · Managed IT</text>
  <!-- Bottom bar -->
  <rect x="80" y="550" width="120" height="4" rx="2" fill="url(#accent)"/>
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="14" fill="#64748B">iabestsell.com</text>
</svg>
